<!DOCTYPE html>
<html>
<head>
    <title>Smart Bus Sync</title>
</head>
<body>

    <h1>Student Search</h1>

    <form method="POST">
        <label>Student ID:</label>
        <input type="text" name="student_id" required>
        <button type="submit" name="action" value="search">Search</button>

        <hr>

        {% if student %}

        <h3>Student Details</h3>

        <p><strong>ID:</strong> {{ student[0] }}</p>
        <p><strong>Name:</strong> {{ student[1] }}</p>
        <p><strong>College:</strong> {{ student[2] }}</p>
        <p><strong>Department:</strong> {{ student[3] }}</p>
        <p><strong>Year:</strong> {{ student[4] }}</p>
        <p><strong>Bus:</strong> {{ student[5] }}</p>
        <p><strong>Stop:</strong> {{ student[6] }}</p>

        <input type="hidden" name="student_id" value="{{ student[0] }}">

        <label>Status:</label>
        <select name="status">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
            <option value="Study Leave">Study Leave</option>
            <option value="Semester Leave">Semester Leave</option>
        </select>

        <button type="submit" name="action" value="save">
            Submit Status
        </button>

        {% endif %}

    </form>

    {% if message %}
        <h3>{{ message }}</h3>
    {% endif %}

</body>
</html>
