<!DOCTYPE html>
<html>
<head>
    <title>Bus Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Bus Merge Recommendations</h1>

<table border="1">
    <tr>
        <th>Primary Bus</th>
        <th>Merged Bus</th>
        <th>Total Students</th>
        <th>Date</th>
    </tr>

    {% for row in recommendations %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
